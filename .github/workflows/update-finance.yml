# Update finance assets indicators
name: Update Finances
on:
  schedule:
    # Runs every day at 10A.M (UTC)
    - cron: "0 10 * * *"
  workflow_dispatch: # allows manual exec
jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install

      - name: Executar script
        run: |
          npm run build
          npm run start

        env:
          # SUPABSE
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_ID: ${{ secrets.SUPABASE_DB_ID }}
          SUPABASE_DB_AWS_REGION: ${{ secrets.SUPABASE_DB_AWS_REGION }}
          # SPREADSHEET
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SPREADSHEET_RANGES: ${{ secrets.SPREADSHEET_RANGES }}
          # GOOGLE
          GOOGLE_PROJECT_ID: ${{ secrets.GOOGLE_PROJECT_ID }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          # OTHERS
          LANGUAGE: ${{ secrets.LANGUAGE }}
