# Update finance assets indicators
name: Update Indicators
on:
  schedule:
    # Runs every day at 10A.M (UTC)
    - cron: "0 10 * * *"
  workflow_dispatch: # allows manual exec
jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      # SUPABSE
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DB_ID: ${{ secrets.SUPABASE_DB_ID }}
      SUPABASE_DB_AWS_REGION: ${{ secrets.SUPABASE_DB_AWS_REGION }}
      # SPREADSHEET
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      SPREADSHEET_RANGES: ${{ secrets.SPREADSHEET_RANGES }}
      # GOOGLE
      GOOGLE_PROJECT_ID: ${{ secrets.GOOGLE_PROJECT_ID }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
      # OTHERS
      LANGUAGE: ${{ secrets.LANGUAGE }}

    steps:
      - name: Checkout off code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: npm install

      - name: Install Prisma Types
        run: npx prisma generate

      - name: Install PostgreDB for Tests
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for PostgreSQL
        run: |
          until [ "$(docker inspect -f {{.State.Health.Status}} $(docker compose -f docker-compose.test.yml ps -q postgres-test))" = "healthy" ]; do
          echo "Waiting for postgres..."
          sleep 2
          done

      - name: Test Code
        run: npm run test

      - name: Exec script
        run: |
          npm run build
          npm run start
